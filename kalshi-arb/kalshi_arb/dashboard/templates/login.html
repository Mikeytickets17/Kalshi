<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-900">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — kalshi-arb</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center text-slate-200">
  <div class="w-full max-w-sm px-6">
    <h1 class="text-cyan-300 font-bold text-2xl mb-1">kalshi-arb</h1>
    <p class="text-slate-500 text-xs mb-6">Operator login</p>

    {% if error %}
      <div class="mb-4 rounded bg-red-900/50 border border-red-700 text-red-200 text-sm p-2">
        Invalid credentials.
      </div>
    {% endif %}

    <form method="POST" action="/login" class="space-y-4">
      <div>
        <label class="block text-xs text-slate-400 mb-1">Username</label>
        <input type="text" name="username" autocomplete="username"
               class="w-full rounded bg-slate-800 border border-slate-700 px-3 py-2 text-slate-100 focus:outline-none focus:border-cyan-500"
               required autofocus>
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Password</label>
        <input type="password" name="password" autocomplete="current-password"
               class="w-full rounded bg-slate-800 border border-slate-700 px-3 py-2 text-slate-100 focus:outline-none focus:border-cyan-500"
               required>
      </div>
      <button type="submit"
              class="w-full rounded bg-cyan-600 hover:bg-cyan-500 py-2 text-slate-950 font-semibold">
        Sign in
      </button>
    </form>
    <p class="text-slate-600 text-[10px] mt-6 text-center">
      Read-only observability. No trade controls are exposed here.
    </p>
  </div>
</body>
</html>
